<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <meta name="description" content="Adidas Messi F50 Elite FG Football Boots - Official Product Page" />
  <title>Adidas Messi F50 Elite FG</title>
  <link rel="stylesheet" href="globals.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="MESSI" role="main">
    <!-- Decorative background vector elements -->
    <img class="vector" src="img/vector-7.svg" alt="" aria-hidden="true" />
    <img class="img" src="img/vector-6.svg" alt="" aria-hidden="true" />
    <img class="vector-2" src="img/vector-5.svg" alt="" aria-hidden="true" />
    <img class="vector-3" src="img/vector-4.svg" alt="" aria-hidden="true" />
    <img class="vector-4" src="img/vector-2.svg" alt="" aria-hidden="true" />
    <img class="vector-5" src="img/vector-1.svg" alt="" aria-hidden="true" />
    <img class="vector-6" src="img/vector-3.svg" alt="" aria-hidden="true" />
    <!-- Main screen / product card -->
    <article class="screen" aria-label="Adidas Messi F50 Elite FG Product">
      <!-- Dark background frame -->
      <div class="frame" aria-hidden="true"></div>
      <!-- Slide navigation indicators -->
      <nav class="navigation-bar" aria-label="Slide navigation">
        <button class="ellipse" aria-label="Slide 1" type="button"></button>
        <button class="div" aria-label="Slide 2" type="button"></button>
        <button class="ellipse-2" aria-label="Slide 3" type="button"></button>
        <button class="ellipse-3" aria-label="Slide 4" type="button"></button>
        <button class="ellipse-4" aria-label="Slide 5 (current)" type="button" aria-current="true"></button>
      </nav>
      <!-- Color chooser label -->
      <p class="text-wrapper" aria-label="Choose color section">CHOOSE COLOR :</p>
      <!-- Decorative line separator -->
      <img class="line" src="img/line-4.svg" alt="" aria-hidden="true" />
      <!-- Hero product image -->
      <img class="image" src="img/image-1.png"
        alt="Adidas Messi F50 Elite FG football boot in white, red and gold colorway" />
      <!-- Search, cart and profile icons -->
      <img class="search-cart-and" src="img/search-cart-and-profile.svg"
        alt="Search, shopping cart and user profile icons" />
      <!-- Primary navigation -->
      <nav class="navbar" aria-label="Main navigation">
        <a class="text-wrapper-2" href="#home">HOME</a>
        <a class="text-wrapper-3" href="#man">MAN</a>
        <a class="text-wrapper-4" href="#woman">WOMAN</a>
        <a class="text-wrapper-5" href="#kids">KIDS</a>
        <a class="text-wrapper-6" href="#sale">SALE</a>
      </nav>
      <!-- Call to action buttons -->
      <div class="CTA">
        <div class="frame-wrapper">
          <div class="div-wrapper">
            <button class="text-wrapper-7" type="button" aria-label="Add Adidas Messi F50 Elite FG to cart">
              ADD TO CART
            </button>
          </div>
        </div>
        <div class="frame-2">
          <div class="div-wrapper">
            <button class="text-wrapper-8" type="button" aria-label="Buy Adidas Messi F50 Elite FG now">
              BUY NOW
            </button>
          </div>
        </div>
      </div>
      <!-- Product inspiration section -->
      <section class="information-of" aria-label="Product inspiration">
        <h2 class="text-wrapper-9">INSPIRATION</h2>
        <p class="p">
          Inspired by the speed and playing style of Lionel Messi, the Adidas F50 Messi Elite helps players move
          faster and control the ball with precision on the field.
        </p>
      </section>
    </article>
    <!-- Additional decorative vectors -->
    <img class="vector-7" src="img/vector-8.svg" alt="" aria-hidden="true" />
    <img class="vector-8" src="img/vector-9.svg" alt="" aria-hidden="true" />
    <!-- Background rectangle accent -->
    <div class="rectangle" aria-hidden="true"></div>
    <!-- Pricing and product title -->
    <div class="pricing" aria-label="Product pricing and title">
      <p class="text-wrapper-10" aria-label="Price: 199 dollars">199$</p>
      <div class="frame-3">
        <div class="limit-wrapper">
          <span class="limit" aria-label="Exclusive product">exclusive</span>
        </div>
        <div class="ADIDAS-MESSI-wrapper">
          <p class="ADIDAS-MESSI">
            <span class="span">ADIDAS<br /></span>
            <span class="text-wrapper-11">MESSI F50 ELITE FG</span>
          </p>
        </div>
      </div>
    </div>
    <!-- Adidas logo -->
    <img class="favpng" src="img/favpng-097a469961e39e63309b34561bb3445b-1.png" alt="Adidas logo" />
  </main>
</body>

</html>
