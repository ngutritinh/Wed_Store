<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta name="description" content="Adidas Messi F50 Elite FG Football Boots - Elite Speed" />
    <title>Adidas Messi F50 Elite FG</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Outer frame / page wrapper -->
    <main class="frame">
      <!-- Browser screen mockup -->
      <section class="screen" aria-label="Product showcase">
        <!-- Dark background overlay -->
        <div class="div" aria-hidden="true"></div>
        <!-- Navigation dot indicators (e.g. carousel/slide indicators) -->
        <nav class="navigation-bar" aria-label="Slide indicators">
          <img class="ellipse" src="img/Ellipse 5.png" alt="Slide 5 indicator" />
          <img class="ellipse" src="img/Ellipse 4.png" alt="Slide 4 indicator" />
          <img class="ellipse" src="img/Ellipse 3.png" alt="Slide 3 indicator" />
          <img class="ellipse" src="img/Ellipse 2.png" alt="Slide 2 indicator" />
          <img class="ellipse" src="img/Ellipse 1.png" alt="Slide 1 indicator (active)" />
        </nav>
        <!-- Decorative separator line -->
        <img class="line" src="img/line-4.svg" alt="" aria-hidden="true" />
        <!-- Hero product image -->
        <img class="image" src="img/GiayF50.png" alt="Adidas Messi F50 Elite FG football boot in red, white and gold" />
        <!-- Top-right utility icons: search, cart, profile -->
        <div class="ico">
          <img class="search" src="img/search.png" alt="Search, cart and profile icons" />
          <img class="cart" src="img/hang.png" alt="Search, cart and profile icons" />
          <img class="ava" src="img/avatar.png" alt="Search, cart and profile icons" />
        </div>
        <!-- Primary navigation bar -->
        <nav class="navbar" aria-label="Main navigation">
          <a class="text-wrapper-2" href="#home">HOME</a>
          <a class="text-wrapper-3" href="#man">MAN</a>
          <a class="text-wrapper-4" href="#woman">WOMAN</a>
          <a class="text-wrapper-5" href="#kids">KIDS</a>
          <a class="text-wrapper-6" href="#sale">SALE</a>
        </nav>
        <!-- Call-to-action buttons -->
        <div class="CTA">
          <!-- Add to Cart button -->
          <div class="frame-wrapper">
            <div class="div-wrapper">
              <button class="text-wrapper-7" type="button" aria-label="Add Adidas Messi F50 Elite FG to cart">
                ADD TO CART
              </button>
            </div>
          </div>
          <!-- Buy Now button -->
          <div class="frame-wrapper-2">
            <div class="div-wrapper">
              <button class="text-wrapper-8" type="button" aria-label="Buy Adidas Messi F50 Elite FG now">
                BUY NOW
              </button>
            </div>
          </div>
        </div>
        <!-- Product inspiration / description -->
        <article class="information-of" aria-label="Product inspiration">
          <h2 class="text-wrapper-9">INSPIRATION</h2>
          <p class="p">
            Inspired by the speed and playing style of Lionel Messi, the Adidas F50 Messi Elite helps players move
            faster and control the ball with precision on the field.
          </p>
        </article>
      </section>
      <!-- Pricing and product title block -->
      <div class="pricing">
        <p class="text-wrapper-10" aria-label="Price: 199 dollars">199$</p>
        <div class="div-2">
          <!-- Exclusive badge -->
          <div class="limit-wrapper">
            <span class="limit">exclusive</span>
          </div>
          <!-- Product name -->
          <div class="ADIDAS-MESSI-wrapper">
            <h1 class="ADIDAS-MESSI">
              <span class="span">ADIDAS<br /></span>
              <span class="text-wrapper-11">MESSI F50 ELITE FG</span>
            </h1>
          </div>
        </div>
      </div>
      <!-- Adidas logo / brand mark -->
      <img class="favpng" src="img/ADIDAS.png" alt="Adidas logo" />
    </main>
  </body>
</html>
